upstream inventra_app {
    server 127.0.0.1:8000;
}

upstream inventra_ws {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name *.inventra.io inventra.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name *.inventra.io inventra.io;

    ssl_certificate /etc/ssl/inventra/fullchain.pem;
    ssl_certificate_key /etc/ssl/inventra/privkey.pem;

    client_max_body_size 50M;

    # Static files
    location /static/ {
        alias /var/www/inventra/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /var/www/inventra/media/;
        expires 7d;
    }

    # WebSockets
    location /ws/ {
        proxy_pass http://inventra_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API & App
    location / {
        proxy_pass http://inventra_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tenant resolution via subdomain passes through Host header
        proxy_set_header X-Tenant-Host $host;

        proxy_read_timeout 60;
        proxy_connect_timeout 60;
    }
}
